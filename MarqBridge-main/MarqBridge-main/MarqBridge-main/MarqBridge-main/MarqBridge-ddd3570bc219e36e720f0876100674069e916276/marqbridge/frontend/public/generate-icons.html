<!DOCTYPE html>
<html>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<img id="logo" src="../logo copy.png" style="display:none;">
<script>
const logoImg = document.getElementById('logo');

logoImg.onload = function() {
  drawIcon('c192', 192);
  setTimeout(() => drawIcon('c512', 512), 500);
};

function drawIcon(id, size) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');

  // Background
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, size, size);

  // Rounded rectangle background
  const r = size * 0.2;
  ctx.beginPath();
  ctx.roundRect(size*0.15, size*0.15, size*0.7, size*0.7, r);
  ctx.fillStyle = 'rgba(224,184,74,0.15)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(224,184,74,0.3)';
  ctx.lineWidth = size * 0.015;
  ctx.stroke();

  // Draw logo image instead of text
  const logoSize = size * 0.4;
  const logoX = (size - logoSize) / 2;
  const logoY = (size - logoSize) / 2;
  ctx.drawImage(logoImg, logoX, logoY, logoSize, logoSize);

  const link = document.createElement('a');
  link.download = `icon-${size}.png`;
  link.href = c.toDataURL();
  link.click();
}
</script>
</body>
</html>
